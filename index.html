<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Fahmida Faiza Lira — Portfolio</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <style>
      :root{
      --ink:#1B1B2F;
      --paper:#FAF6F0;
      --coral:#E8542E;
      --gold:#C9A227;
      --slate:#6B6B7B;
      --hair: rgba(27,27,47,0.14);
      }
      *{ margin:0; padding:0; box-sizing:border-box; }
      html{ scroll-behavior:smooth; }
      body{
      background:var(--paper);
      color:var(--ink);
      font-family:'Inter', sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      }
      @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
      }
      h1,h2,h3{
      font-family:'Bodoni Moda', serif;
      font-weight:700;
      letter-spacing:-0.01em;
      }
      a{ color:inherit; }
      :focus-visible{
      outline:2.5px solid var(--coral);
      outline-offset:3px;
      border-radius:2px;
      }
      .wrap{
      max-width:880px;
      margin:0 auto;
      padding:0 28px;
      }
      /* ---------- NAV ---------- */
      .nav{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(250,246,240,0.88);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--hair);
      }
      .nav-inner{
      max-width:880px;
      margin:0 auto;
      padding:16px 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      }
      .nav-mark{
      font-family:'Bodoni Moda', serif;
      font-weight:700;
      font-size:1.05rem;
      letter-spacing:0.01em;
      }
      .nav-mark span{ color:var(--coral); }
      .nav-links{
      display:flex;
      gap:22px;
      list-style:none;
      font-size:0.82rem;
      letter-spacing:0.06em;
      text-transform:uppercase;
      }
      .nav-links a{
      text-decoration:none;
      color:var(--slate);
      transition:color 0.2s ease;
      padding:4px 0;
      position:relative;
      }
      .nav-links a:hover{ color:var(--ink); }
      @media (max-width:560px){
      .nav-links{ gap:14px; font-size:0.7rem; }
      }
      /* ---------- HERO ---------- */
      .hero{
      padding:90px 0 70px;
      position:relative;
      }
      .hero-eyebrow{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:0.78rem;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--coral);
      font-weight:600;
      margin-bottom:22px;
      opacity:0;
      animation:rise 0.7s 0.05s ease forwards;
      }
      .hero-eyebrow::before{
      content:"";
      width:28px;
      height:2px;
      background:var(--coral);
      display:inline-block;
      }
      .hero h1{
      font-size:clamp(2.6rem, 7vw, 4.6rem);
      line-height:1.04;
      opacity:0;
      animation:rise 0.8s 0.15s ease forwards;
      }
      .hero h1 em{
      font-style:italic;
      color:var(--coral);
      }
      .hero-role{
      margin-top:22px;
      font-size:1.05rem;
      color:var(--slate);
      max-width:540px;
      line-height:1.6;
      opacity:0;
      animation:rise 0.8s 0.3s ease forwards;
      }
      .hero-tags{
      margin-top:34px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      opacity:0;
      animation:rise 0.8s 0.45s ease forwards;
      }
      .hero-tag{
      font-size:0.76rem;
      letter-spacing:0.05em;
      text-transform:uppercase;
      border:1px solid var(--hair);
      padding:7px 14px;
      border-radius:30px;
      color:var(--ink);
      }
      @keyframes rise{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
      }
      /* ---------- SECTION SHELL ---------- */
      section{
      padding:64px 0;
      border-top:1px solid var(--hair);
      }
      .label{
      display:flex;
      align-items:baseline;
      gap:14px;
      margin-bottom:38px;
      }
      .label .num{
      font-family:'Bodoni Moda', serif;
      font-style:italic;
      color:var(--coral);
      font-size:1rem;
      }
      .label h2{
      font-size:1.7rem;
      }
      /* ---------- EDUCATION: FILM-STRIP TIMELINE ---------- */
      .reel{
      position:relative;
      padding-left:42px;
      }
      .reel::before{
      content:"";
      position:absolute;
      left:10px;
      top:6px;
      bottom:6px;
      width:1px;
      background:repeating-linear-gradient(
      to bottom,
      var(--ink) 0,
      var(--ink) 6px,
      transparent 6px,
      transparent 14px
      );
      opacity:0.35;
      }
      .frame{
      position:relative;
      padding-bottom:42px;
      }
      .frame:last-child{ padding-bottom:0; }
      .frame::before{
      content:"";
      position:absolute;
      left:-42px;
      top:4px;
      width:11px;
      height:11px;
      border-radius:50%;
      background:var(--paper);
      border:2px solid var(--coral);
      }
      .frame-tag{
      font-size:0.74rem;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--coral);
      font-weight:600;
      margin-bottom:8px;
      }
      .frame h3{
      font-size:1.3rem;
      margin-bottom:6px;
      }
